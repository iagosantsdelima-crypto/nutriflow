name: Deploy site

on:
  push:
    branches:      
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:     
    - name: Baixar código
      uses: actions/checkout@v3
      
    - name: Instalar dependências
      run: npm install
    
    - name: Build do projeto
      run: npm run build
 
    - name: Deploy no GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
